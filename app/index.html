<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get Swapd</title>
<meta name="description" content="Download Swapd — the photos you'd never post.">
<meta name="theme-color" content="#0C6E72">

<!-- iOS Smart App Banner — auto-offers App Store when viewed on iPhone Safari -->
<!-- Update with real App Store ID once app is live: -->
<!-- <meta name="apple-itunes-app" content="app-id=YOUR_APP_ID"> -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;700;800;900&family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap" rel="stylesheet">

<style>
  :root {
    --teal: #0C6E72;
    --teal-ink: #052E30;
    --teal-softer: #F2F8F8;
    --pink: #FF4E94;
    --white: #FFFFFF;
    --ink: #151517;
    --ink-2: #4A4A52;
    --ink-3: #8A8A92;
    --shadow-lift: 0 1px 3px rgba(12,110,114,.15), 0 10px 24px rgba(12,110,114,.18);
    --shadow-md: 0 2px 4px rgba(15,15,20,.04), 0 8px 20px rgba(15,15,20,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Figtree', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, var(--teal-softer) 0%, var(--white) 100%);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    text-align: center;
    -webkit-font-smoothing: antialiased;
  }
  .wordmark {
    font-weight: 900;
    font-size: 48px;
    letter-spacing: -0.035em;
    color: var(--teal-ink);
    margin-bottom: 8px;
  }
  .wordmark-dot {
    display: inline-block;
    width: 10px; height: 10px;
    background: var(--pink);
    border-radius: 50%;
    vertical-align: super;
    margin-left: 3px;
    margin-top: 8px;
  }
  .tagline {
    font-family: 'Fraunces', Georgia, serif;
    font-style: italic;
    font-size: 20px;
    color: var(--teal-ink);
    margin-bottom: 48px;
    font-variation-settings: 'opsz' 72;
    font-weight: 400;
  }
  .status {
    font-size: 15px;
    color: var(--ink-2);
    margin-bottom: 32px;
    min-height: 24px;
    max-width: 320px;
  }
  .buttons {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 320px;
  }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px 24px;
    border-radius: 100px;
    font-family: 'Figtree', sans-serif;
    font-weight: 700;
    font-size: 16px;
    text-decoration: none;
    letter-spacing: -0.01em;
    transition: transform 0.15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary {
    background: var(--teal);
    color: var(--white);
    box-shadow: var(--shadow-lift);
  }
  .btn-white {
    background: var(--white);
    color: var(--ink);
    box-shadow: var(--shadow-md);
  }
  .btn-ghost {
    color: var(--ink-3);
    background: transparent;
    font-size: 14px;
    font-weight: 600;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--teal);
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .home-link {
    position: fixed;
    top: 20px; left: 20px;
    color: var(--ink-3);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }
  .home-link:hover { color: var(--ink); }
</style>
</head>
<body>

<a href="/" class="home-link">← getswapd.com</a>

<div class="wordmark">swapd<span class="wordmark-dot"></span></div>
<div class="tagline">The photos you'd never post.</div>

<div class="status" id="status">
  <span class="spinner"></span>Taking you to the right place…
</div>

<div class="buttons" id="buttons" style="display:none;">
  <!-- Buttons injected by the script below if auto-redirect fails -->
</div>

<script>
  // ==========================================================
  // UPDATE THESE URLs WHEN THE APP IS LIVE ON THE STORES
  // ==========================================================
  var APP_STORE_URL  = 'https://apps.apple.com/app/swapd/idYOUR_ID';
  var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.swapd.app';
  // ==========================================================

  // Swapd is not yet published — while it isn't, show a "coming soon"
  // state instead of sending people to non-existent listings.
  // Flip this to false when the app is submitted & approved on both stores.
  var APP_LIVE = false;

  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isIOS     = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);
  var isMobile  = isIOS || isAndroid;

  var statusEl  = document.getElementById('status');
  var buttonsEl = document.getElementById('buttons');

  function showButtons(buttons) {
    statusEl.style.display = 'none';
    buttonsEl.style.display = 'flex';
    buttonsEl.innerHTML = buttons;
  }

  if (!APP_LIVE) {
    // ------ Pre-launch state ------
    showButtons(
      '<div style="padding:24px 16px; background:rgba(12,110,114,0.06); border-radius:16px; margin-bottom:8px;">' +
        '<div style="font-weight:700; color:var(--teal-ink); margin-bottom:6px;">Coming soon.</div>' +
        '<div style="font-size:14px; color:var(--ink-2); line-height:1.5;">Swapd is in final testing. Leave your email and we\'ll tell you the moment it\'s live.</div>' +
      '</div>' +
      '<a href="mailto:hello@getswapd.com?subject=Tell%20me%20when%20Swapd%20is%20live" class="btn btn-primary">Get notified</a>' +
      '<a href="/" class="btn btn-ghost">Back to getswapd.com</a>'
    );
  } else if (isIOS) {
    // ------ iOS: redirect to App Store ------
    statusEl.innerHTML = '<span class="spinner"></span>Opening the App Store…';
    setTimeout(function () { window.location.replace(APP_STORE_URL); }, 400);
    // Fallback buttons if redirect is blocked:
    setTimeout(function () {
      showButtons(
        '<a href="' + APP_STORE_URL + '" class="btn btn-primary">Open App Store</a>' +
        '<a href="/" class="btn btn-ghost">Back</a>'
      );
    }, 2500);
  } else if (isAndroid) {
    // ------ Android: redirect to Play Store ------
    statusEl.innerHTML = '<span class="spinner"></span>Opening Google Play…';
    setTimeout(function () { window.location.replace(PLAY_STORE_URL); }, 400);
    setTimeout(function () {
      showButtons(
        '<a href="' + PLAY_STORE_URL + '" class="btn btn-primary">Open Google Play</a>' +
        '<a href="/" class="btn btn-ghost">Back</a>'
      );
    }, 2500);
  } else {
    // ------ Desktop / other: show both options ------
    showButtons(
      '<a href="' + APP_STORE_URL  + '" class="btn btn-primary">Download on the App Store</a>' +
      '<a href="' + PLAY_STORE_URL + '" class="btn btn-white">Get it on Google Play</a>' +
      '<a href="/" class="btn btn-ghost">Open getswapd.com instead</a>'
    );
    statusEl.innerHTML = 'Open this on your phone to install, or pick a store:';
  }
</script>

</body>
</html>

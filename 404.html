<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Swapd</title>
  <script>
    // GitHub Pages doesn't do server-side rewrites, so /join/<CODE>
    // 404s by default. Catch that here: if the path looks like
    // /join/<valid-code>, rewrite to the real landing page at
    // /join/?code=<CODE>. iOS Universal Links still verify against
    // the bare /join/<CODE> path (AASA pattern "/join/*"), so the
    // 404 is only ever visible to users who don't have the app.
    (function () {
      var m = window.location.pathname.match(/^\/join\/([A-Za-z0-9]{4,16})\/?$/);
      if (m) {
        window.location.replace('/join/?code=' + m[1].toUpperCase());
      }
    })();
  </script>
  <style>
    html, body { margin: 0; padding: 0; background: #FFF8F5; color: #052E30; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    main { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 32px 18px; text-align: center; }
    h1 { font-size: 28px; margin: 0 0 12px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: #3F5B5D; margin: 0; }
    a { color: #0C6E72; font-weight: 700; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <div>
      <h1>Nothing here.</h1>
      <p>Head back to <a href="/">getswapd.com</a>.</p>
    </div>
  </main>
</body>
</html>

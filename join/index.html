<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>You're invited — Swapd</title>
  <style>
    :root {
      --teal: #0C6E72;
      --teal-deep: #084D50;
      --teal-ink: #052E30;
      --teal-soft: #E6F2F2;
      --ink-secondary: #3F5B5D;
      --bg-start: #FFF8F5;
      --bg-end: #FCEEEA;
      --card: #FFFFFF;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, var(--bg-start) 0%, var(--bg-end) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--teal-ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }
    .card {
      background: var(--card);
      border-radius: 24px;
      padding: 32px 24px;
      max-width: 440px;
      width: 100%;
      box-shadow: 0 12px 40px rgba(5, 46, 48, 0.08);
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--teal);
      margin: 0 0 4px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin: 0 0 12px;
    }
    .lead {
      font-size: 16px;
      line-height: 1.5;
      color: var(--ink-secondary);
      margin: 0 0 24px;
    }
    .code-box {
      background: var(--teal-soft);
      border: 1px solid var(--teal);
      border-radius: 16px;
      padding: 16px 20px;
      text-align: center;
    }
    .code-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--ink-secondary);
      margin: 0 0 6px;
    }
    .code {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 6px;
      color: var(--teal-ink);
      margin: 0;
      word-break: break-all;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 24px;
    }
    .btn {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
    }
    .btn-primary {
      background: var(--teal);
      color: #FFFFFF;
    }
    .btn-primary:active { background: var(--teal-deep); }
    .btn-secondary {
      background: transparent;
      color: var(--teal);
      border: 1px solid var(--teal);
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 600;
    }
    .small {
      font-size: 12px;
      line-height: 1.55;
      color: var(--ink-secondary);
      margin: 18px 0 0;
    }
    .invalid {
      text-align: center;
    }
    .invalid h1 { margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <!-- Populated by script below. -->
  </div>

  <script>
    (function () {
      // App Store ID is a placeholder until the app ships. Leaving
      // it at 0000000000 resolves to apps.apple.com's "not found"
      // page, which is fine for TestFlight testing -- the
      // swapd:// fallback button still opens the installed app.
      var APP_STORE_URL = 'https://apps.apple.com/app/swapd/id0000000000';
      var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=app.swapd';

      function parseCode() {
        var params = new URLSearchParams(window.location.search);
        var raw = (params.get('code') || '').trim().toUpperCase();
        if (!/^[A-Z0-9]{4,16}$/.test(raw)) return null;
        return raw;
      }

      function detectPlatform() {
        var ua = navigator.userAgent || '';
        if (/iPhone|iPad|iPod/i.test(ua)) return 'ios';
        if (/Android/i.test(ua)) return 'android';
        return 'other';
      }

      function escapeHtml(s) {
        return s.replace(/[&<>"']/g, function (c) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c];
        });
      }

      var card = document.getElementById('card');
      var code = parseCode();

      if (!code) {
        card.className = 'card invalid';
        card.innerHTML =
          '<p class="eyebrow">SWAPD</p>' +
          '<h1>Invite link not recognised.</h1>' +
          '<p class="lead">Ask whoever sent it for the code and paste it into the app.</p>';
        return;
      }

      var platform = detectPlatform();
      var storeLabel = platform === 'android' ? 'Get it on Google Play' : 'Download on the App Store';
      var storeUrl = platform === 'android' ? PLAY_STORE_URL : APP_STORE_URL;

      card.innerHTML =
        '<p class="eyebrow">SWAPD</p>' +
        '<h1>You&rsquo;re invited.</h1>' +
        '<p class="lead">Swapd is a tiny, private space for two people. Someone you know just made one with you in mind.</p>' +
        '<div class="code-box">' +
          '<p class="code-label">Your invite code</p>' +
          '<p class="code">' + escapeHtml(code) + '</p>' +
        '</div>' +
        '<div class="actions">' +
          '<button type="button" class="btn btn-primary" id="install-btn">' + storeLabel + '</button>' +
          '<button type="button" class="btn btn-secondary" id="open-btn">I already have Swapd</button>' +
        '</div>' +
        '<p class="small">After installing, open Swapd. The code will be in your clipboard ready to paste &mdash; or type it in manually if you prefer.</p>';

      var installBtn = document.getElementById('install-btn');
      var openBtn = document.getElementById('open-btn');

      installBtn.addEventListener('click', function () {
        var done = function () {
          installBtn.textContent = 'Code copied — opening store…';
          window.setTimeout(function () {
            window.location.href = storeUrl;
          }, 350);
        };
        // navigator.clipboard needs a secure context (https) and
        // user gesture. Both are true here. The fallback only runs
        // if the API is unavailable; the code is still visible on
        // the page so the user can copy it manually.
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code).then(done, done);
        } else {
          done();
        }
      });

      openBtn.addEventListener('click', function () {
        window.location.href = 'swapd://join/' + code;
      });
    })();
  </script>
</body>
</html>
